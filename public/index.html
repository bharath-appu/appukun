<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Appukun — AI Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { background: #0f0c29; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f0c29, #1a1a3e, #24243e) fixed;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 40px 16px;
  }
  .container {
    width: 100%;
    max-width: 680px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 4px;
  }
  .brand-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, #4285f4, #34a853);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 18px;
    color: #fff;
  }
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.5px;
  }
  .subtitle {
    color: #999;
    font-size: 14px;
    margin-bottom: 24px;
    margin-left: 52px;
  }
  .card {
    background: rgba(20, 20, 40, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 22px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: #aaa;
    margin-bottom: 6px;
  }
  textarea, select {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #e0e0e0;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color .2s;
  }
  textarea:focus, select:focus {
    border-color: #4285f4;
  }
  textarea { resize: vertical; min-height: 80px; font-family: inherit; }
  select {
    cursor: pointer;
    color-scheme: dark;
    background: rgba(10,10,25,0.7);
  }
  .form-group { margin-bottom: 14px; }
  .row {
    display: flex;
    gap: 12px;
  }
  .row > * { flex: 1; }
  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, #4285f4, #34a853);
    border: none;
    color: #fff;
    padding: 12px;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 6px;
  }
  .btn-primary:hover { opacity: .9; }
  .btn-primary:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    opacity: 1;
  }

  .examples {
    margin-top: 18px;
  }
  .examples-label {
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
  }
  .example-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .example-item {
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .2s;
    position: relative;
    aspect-ratio: 1;
  }
  .example-item:hover { border-color: #4285f4; }
  .example-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .example-item .aspect-label {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.7);
    font-size: 10px;
    padding: 3px 6px;
    color: #ccc;
    text-align: center;
  }

  .result {
    margin-top: 20px;
    display: none;
  }
  .result.show { display: block; }
  .result-card {
    background: rgba(20, 20, 40, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .result-card img {
    width: 100%;
    border-radius: 10px;
    display: block;
  }
  .result-caption {
    font-size: 13px;
    color: #999;
    margin-top: 10px;
    font-style: italic;
  }
  .result-actions {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .result-actions button {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: #ccc;
    padding: 10px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
  }
  .result-actions button:hover {
    background: rgba(255,255,255,0.1);
    color: #fff;
  }
  .error {
    background: rgba(100,20,20,0.5);
    border: 1px solid rgba(200,50,50,0.3);
    border-radius: 8px;
    padding: 12px;
    color: #f66;
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }
  .error.show { display: block; }
  .spinner {
    display: none;
    text-align: center;
    padding: 40px 0;
  }
  .spinner.show { display: block; }
  .spinner-inner {
    width: 32px; height: 32px;
    border: 3px solid rgba(66,133,244,0.2);
    border-top: 3px solid #4285f4;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner p { color: #888; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="brand">
    <div class="brand-icon">A</div>
      <h1>Appukun</h1>
    </div>
    <p class="subtitle">AI Image Generator</p>

  <div class="card">
    <div class="form-group">
      <label for="prompt">Prompt</label>
      <textarea id="prompt" placeholder="Describe the image you want to generate..."></textarea>
    </div>

    <div class="row">
      <div class="form-group">
        <label for="aspectRatio">Aspect Ratio</label>
        <select id="aspectRatio">
          <option value="1:1">1:1 Square</option>
          <option value="16:9">16:9 Landscape</option>
          <option value="4:3">4:3</option>
          <option value="3:2">3:2</option>
          <option value="2.35:1">2.35:1 Cinematic</option>
          <option value="4:5">4:5 Portrait</option>
          <option value="2:3">2:3</option>
          <option value="9:16">9:16 Phone</option>
        </select>
      </div>
      <div class="form-group">
        <label for="creativity">Creativity</label>
        <select id="creativity">
          <option value="raw">Raw</option>
          <option value="low">Low</option>
          <option value="medium" selected>Medium</option>
          <option value="high">High</option>
        </select>
      </div>
    </div>

    <button class="btn-primary" id="generateBtn" onclick="generate()">Generate</button>
  </div>

  <div class="examples">
    <div class="examples-label">Try an example prompt</div>
    <div class="example-grid">
      <div class="example-item" onclick="useExample('A serene mountain lake at sunrise, mist rising from the water, photorealistic')" title="16:9 Landscape">
        <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=400&fit=crop" alt="mountain">
        <div class="aspect-label">Landscape</div>
      </div>
      <div class="example-item" onclick="useExample('A cute orange tabby cat wearing a wizard hat, casting a spell, magical glowing sparks, digital art')" title="1:1 Square">
        <img src="https://images.unsplash.com/photo-1574158622682-e40e69881006?w=400&h=400&fit=crop" alt="cat">
        <div class="aspect-label">Square</div>
      </div>
      <div class="example-item" onclick="useExample('A beautiful woman in a flowing red dress, golden hour portrait photography, cinematic lighting, bokeh background')" title="4:5 Portrait">
        <img src="https://images.unsplash.com/photo-1509631179647-0177331693ae?w=400&h=400&fit=crop" alt="portrait">
        <div class="aspect-label">Portrait</div>
      </div>
      <div class="example-item" onclick="useExample('Futuristic cyberpunk city at night, neon signs, flying cars, rain-slicked streets, wide angle')" title="2.35:1 Cinematic">
        <img src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?w=400&h=400&fit=crop" alt="cyberpunk">
        <div class="aspect-label">Cinematic</div>
      </div>
    </div>
  </div>

  <div class="spinner" id="spinner">
    <div class="spinner-inner"></div>
    <p>Generating your image...</p>
  </div>

  <div class="result" id="result">
    <div class="result-card">
      <img id="resultImg" alt="Generated image">
      <div class="result-caption" id="caption"></div>
      <div class="result-actions">
        <button onclick="downloadImage()">Download</button>
        <button onclick="copyImage()">Copy URL</button>
      </div>
    </div>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
  let currentImageUrl = "";

  function useExample(prompt) {
    document.getElementById("prompt").value = prompt;
    document.getElementById("prompt").focus();
  }

  async function generate() {
    const prompt = document.getElementById("prompt").value.trim();
    if (!prompt) {
      showError("Please enter a prompt");
      return;
    }

    const aspect_ratio = document.getElementById("aspectRatio").value;
    const creativity = document.getElementById("creativity").value;

    setLoading(true);
    showError("");
    document.getElementById("result").classList.remove("show");

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt, aspect_ratio, creativity }),
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Request failed");
      }

      currentImageUrl = data.imageUrl;
      document.getElementById("resultImg").src = currentImageUrl;
      document.getElementById("caption").textContent = data.caption || "";
      document.getElementById("result").classList.add("show");
    } catch (err) {
      showError(err.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(loading) {
    document.getElementById("generateBtn").disabled = loading;
    document.getElementById("spinner").classList.toggle("show", loading);
  }

  function showError(msg) {
    const el = document.getElementById("error");
    if (msg) {
      el.textContent = msg;
      el.classList.add("show");
    } else {
      el.classList.remove("show");
    }
  }

  async function downloadImage() {
    if (!currentImageUrl) return;
    const resp = await fetch(currentImageUrl);
    const blob = await resp.blob();
    const ext = blob.type === "image/svg+xml" ? "svg" : "png";
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `appukunimg.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
  }

  async function copyImage() {
    if (!currentImageUrl) return;
    try {
      await navigator.clipboard.writeText(currentImageUrl);
    } catch {
      const input = document.createElement("input");
      input.value = currentImageUrl;
      document.body.appendChild(input);
      input.select();
      document.execCommand("copy");
      document.body.removeChild(input);
    }
  }
</script>
</body>
</html>
